<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>고객 리뷰 | 루디먼트 가이드 에디션 : Rudix</title>
  <meta name="description" content="루디먼트 가이드 에디션 실사용 고객 리뷰 28개 · 평점 5.0. 쿠팡 5점 리뷰와 네이버 체험단 후기를 한눈에." />
  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./style.css?v=20260706-7" />

  <!-- GA4 (랜딩과 동일 속성) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WVEVZ31T9J"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WVEVZ31T9J', { 'linker': { 'domains': ['rudix.biz', 'edition.rudix.biz'], 'accept_incoming': true } });
  </script>

  <style>
    .rv { max-width: 900px; margin: 0 auto; padding: 0 20px 130px; color: #f4f4f4; }
    .rv__top { text-align: center; padding: 56px 0 36px; }
    .rv__eyebrow { font-size: 13px; letter-spacing: 0.22em; color: #ff5a2c; font-weight: 800; margin: 0 0 12px; }
    .rv__title { font-size: 34px; font-weight: 800; margin: 0 0 8px; line-height: 1.3; }
    .rv__title b { color: #ff5a2c; }
    .rv__sub { font-size: 15px; color: rgba(255,255,255,0.6); margin: 0; }

    .rv__summary { display: flex; align-items: center; justify-content: center; gap: 30px; flex-wrap: wrap;
      background: #161616; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 28px; margin-bottom: 44px; }
    .rv__score { text-align: center; }
    .rv__score-num { font-size: 56px; font-weight: 800; line-height: 1; }
    .rv__stars { color: #ffb400; font-size: 20px; letter-spacing: 2px; margin-top: 8px; }
    .rv__score-sub { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 8px; }
    .rv__breakdown { display: flex; gap: 14px; }
    .rv__chip { background: #202020; border-radius: 14px; padding: 14px 20px; text-align: center; min-width: 96px; }
    .rv__chip strong { display: block; font-size: 26px; font-weight: 800; }
    .rv__chip span { font-size: 13px; color: rgba(255,255,255,0.6); }

    .rv__section-title { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 22px; font-weight: 800; margin: 44px 0 20px; }
    .rv__section-title em { font-style: normal; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.5); }
    .rv__badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .rv__badge--cp { background: rgba(255,90,44,0.16); color: #ff875c; }
    .rv__badge--nv { background: rgba(45,190,90,0.16); color: #4fd07a; }

    /* 쿠팡 별점 리뷰 - 마소너리(컬럼) */
    .rv__grid { columns: 2; column-gap: 16px; }
    .rv__card { break-inside: avoid; width: 100%; margin: 0 0 16px; background: #161616;
      border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 20px; }
    .rv__card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .rv__card-stars { color: #ffb400; font-size: 15px; letter-spacing: 1px; }
    .rv__card-src { font-size: 11px; font-weight: 700; color: #ff875c; }
    .rv__card-imgs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .rv__card-imgs a { line-height: 0; }
    .rv__card-imgs img { width: 62px; height: 62px; object-fit: cover; border-radius: 8px; background: #222; }
    .rv__card-text { font-size: 14.5px; line-height: 1.62; color: #dcdcdc; margin: 0; white-space: pre-line;
      display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden; }
    .rv__card.is-open .rv__card-text { -webkit-line-clamp: unset; display: block; }
    .rv__more { background: none; border: 0; color: #ff875c; font-size: 13px; font-weight: 700; cursor: pointer; padding: 8px 0 0; }
    .rv__card-meta { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 12px; }

    /* 네이버 체험단 블로그형 */
    .rv__blog { display: flex; flex-direction: column; gap: 16px; }
    .rv__blog-card { display: grid; grid-template-columns: 150px 1fr; gap: 18px; background: #161616;
      border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 16px; text-decoration: none; color: inherit; transition: border-color .2s; }
    .rv__blog-card:hover { border-color: rgba(79,208,122,0.5); }
    .rv__blog-thumb { width: 150px; height: 120px; border-radius: 12px; object-fit: cover; background: #222; }
    .rv__blog-body h4 { margin: 2px 0 8px; font-size: 18px; font-weight: 700; line-height: 1.4; }
    .rv__blog-body p { margin: 0 0 12px; font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.62);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .rv__blog-more { font-size: 13px; font-weight: 700; color: #4fd07a; }

    .rv__fab { position: fixed; left: 50%; transform: translateX(-50%); bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 100; display: inline-flex; align-items: center; gap: 8px; padding: 16px 30px; border-radius: 999px;
      background: linear-gradient(90deg, #e63d16, #ea5c2a 58%, #ff5a32); color: #fff; text-decoration: none;
      font-size: 18px; font-weight: 700; letter-spacing: -0.02em; box-shadow: 0 8px 26px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,151,98,0.6); }

    @media (max-width: 640px) {
      .rv__title { font-size: 25px; }
      .rv__summary { gap: 20px; padding: 22px 16px; }
      .rv__score-num { font-size: 44px; }
      .rv__grid { columns: 1; }
      .rv__blog-card { grid-template-columns: 96px 1fr; gap: 12px; }
      .rv__blog-thumb { width: 96px; height: 88px; }
    }
  </style>
</head>

<body style="background:#0e0e0e; margin:0;">
  <main class="rv">
    <div class="rv__top">
      <p class="rv__eyebrow">REAL REVIEWS</p>
      <h1 class="rv__title">실사용자 <b>28개 리뷰</b>, 전부 5점</h1>
      <p class="rv__sub">루디먼트 가이드 에디션을 직접 써본 고객들의 후기입니다.</p>
    </div>

    <section class="rv__summary">
      <div class="rv__score">
        <div class="rv__score-num">5.0</div>
        <div class="rv__stars">★★★★★</div>
        <div class="rv__score-sub">총 28개 리뷰 · 100% 만족</div>
      </div>
      <div class="rv__breakdown">
        <div class="rv__chip"><strong>25</strong><span>쿠팡 5점</span></div>
        <div class="rv__chip"><strong>3</strong><span>네이버 체험단</span></div>
      </div>
    </section>

    <h2 class="rv__section-title">쿠팡 리뷰 <span class="rv__badge rv__badge--cp">쿠팡</span> <em>5점 만점 25개</em></h2>
    <div class="rv__grid" id="cpReviews"></div>

    <h2 class="rv__section-title">네이버 체험단 후기 <span class="rv__badge rv__badge--nv">체험단</span> <em>블로그 3편</em></h2>
    <div class="rv__blog" id="nvReviews"></div>
  </main>

  <!-- 토글: 상세페이지(랜딩)로 돌아가기 -->
  <a class="rv__fab" href="./index.html"
     onclick="try{ if(typeof gtag==='function') gtag('event','click_detail'); }catch(e){}">
    <span aria-hidden="true">←</span> 상세페이지 보기
  </a>

  <script src="./reviews-data.js?v=1"></script>
  <script>
    (function () {
      var D = window.RDX_REVIEWS || { coupang: [], naver: [] };
      function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

      // 쿠팡 별점 리뷰
      var cp = document.getElementById('cpReviews');
      D.coupang.forEach(function (r) {
        var name = r.name || '쿠팡 구매고객';
        var imgs = (r.images || []).map(function (u) {
          return '<a href="' + esc(u) + '" target="_blank" rel="noopener"><img loading="lazy" decoding="async" src="' + esc(u) + '" alt="구매자 리뷰 사진"></a>';
        }).join('');
        var card = document.createElement('article');
        card.className = 'rv__card';
        card.innerHTML =
          '<div class="rv__card-head"><span class="rv__card-stars">★★★★★</span><span class="rv__card-src">쿠팡</span></div>'
          + (imgs ? '<div class="rv__card-imgs">' + imgs + '</div>' : '')
          + '<p class="rv__card-text">' + esc(r.content) + '</p>'
          + '<button class="rv__more" type="button">더보기</button>'
          + '<div class="rv__card-meta">' + esc(name) + ' · ' + esc(r.date) + '</div>';
        cp.appendChild(card);

        var textEl = card.querySelector('.rv__card-text');
        var moreBtn = card.querySelector('.rv__more');
        // 클램프에 안 걸릴 만큼 짧으면 더보기 숨김
        requestAnimationFrame(function () {
          if (textEl.scrollHeight - textEl.clientHeight < 6) moreBtn.style.display = 'none';
        });
        moreBtn.addEventListener('click', function () {
          var open = card.classList.toggle('is-open');
          moreBtn.textContent = open ? '접기' : '더보기';
        });
      });

      // 네이버 체험단
      var nv = document.getElementById('nvReviews');
      D.naver.forEach(function (r) {
        var a = document.createElement('a');
        a.className = 'rv__blog-card';
        a.href = r.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
        a.addEventListener('click', function () {
          try { if (typeof gtag === 'function') gtag('event', 'click_naver_review'); } catch (e) {}
        });
        a.innerHTML =
          '<img class="rv__blog-thumb" loading="lazy" decoding="async" src="' + esc(r.thumbnail) + '" alt="네이버 체험단 후기 썸네일">'
          + '<div class="rv__blog-body"><h4>' + esc(r.title) + '</h4><p>' + esc(r.excerpt) + '</p>'
          + '<span class="rv__blog-more">네이버 블로그에서 전체보기 →</span></div>';
        nv.appendChild(a);
      });
    })();
  </script>
</body>

</html>
